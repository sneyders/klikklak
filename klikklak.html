<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="source" content="https://github.com/sneyders/klikklak">
  <meta name="license" content="GPL-3.0">
  <meta name="version" content="1.0">
  <title>Klikklak</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #4a8fd4;
      --blue-light:  #dbeaf8;
      --orange:      #e07830;
      --orange-light:#fde9d9;
      --green:       #5ea63c;
      --green-light: #e2efda;
      --red:         #d95050;
      --red-hover:   #c03e3e;
      --sage:        #7a9f52;
      --sage-hover:  #638040;
      --radius:      18px;
      --shadow:      0 4px 16px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #edf0f4;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ================================================
       MAIN VIEW
    ================================================ */
    #view-main {
      width: 100%;
      max-width: 580px;
      padding: 16px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100dvh;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      padding-top: 4px;
    }

    .btn-settings {
      background: var(--sage);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .btn-settings:hover { background: var(--sage-hover); }

    /* Three column cards */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      flex: 1;
    }

    .card {
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 16px 8px 14px;
      box-shadow: var(--shadow);
      transition: opacity 0.2s;
      min-height: clamp(160px, 38vw, 280px);
    }

    .card-front  { background: var(--blue-light);   border: 3px solid var(--blue); }
    .card-vowel  { background: var(--orange-light);  border: 3px solid var(--orange); }
    .card-last   { background: var(--green-light);   border: 3px solid var(--green); }

    .card.is-locked { opacity: 0.75; }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.5;
    }
    .card-front .card-label  { color: var(--blue); }
    .card-vowel .card-label  { color: var(--orange); }
    .card-last  .card-label  { color: var(--green); }

    .syllable {
      font-size: clamp(42px, 11vw, 88px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      text-align: center;
      flex: 1;
      display: flex;
      align-items: center;
    }
    .card-front .syllable { color: var(--blue); }
    .card-vowel .syllable { color: var(--orange); }
    .card-last  .syllable { color: var(--green); }

    @keyframes pop {
      0%   { transform: scale(0.75); opacity: 0.4; }
      65%  { transform: scale(1.06); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .syllable.pop {
      animation: pop 0.22s ease-out both;
    }

    .lock-btn {
      background: rgba(0,0,0,0.06);
      border: 2px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      width: 38px;
      height: 34px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .lock-btn:hover                      { background: rgba(0,0,0,0.12); }
    .card-front .lock-btn.is-locked     { background: var(--blue);   border-color: var(--blue);   color: #fff; }
    .card-vowel .lock-btn.is-locked     { background: var(--orange); border-color: var(--orange); color: #fff; }
    .card-last  .lock-btn.is-locked     { background: var(--green);  border-color: var(--green);  color: #fff; }

    .btn-new {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 22px 16px;
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 800;
      width: 100%;
      cursor: pointer;
      box-shadow: var(--shadow);
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-new:hover  { background: var(--red-hover); }
    .btn-new:active { transform: scale(0.97); }

    /* ================================================
       SETUP VIEW
    ================================================ */
    #view-setup {
      display: none;
      width: 100%;
      max-width: 580px;
      padding: 16px 16px 32px;
      flex-direction: column;
      gap: 16px;
    }

    .setup-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 4px;
    }

    .setup-topbar h1 {
      font-size: 20px;
      font-weight: 800;
      color: #333;
    }

    .btn-back {
      background: var(--sage);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-back:hover { background: var(--sage-hover); }

    .setup-section {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .setup-section h2 {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 12px;
    }
    .setup-section.sec-front h2 { color: var(--blue); }
    .setup-section.sec-vowel h2 { color: var(--orange); }
    .setup-section.sec-last  h2 { color: var(--green); }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      border-radius: 100px;
      padding: 7px 15px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid;
      transition: background 0.12s, color 0.12s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }

    .setup-section.sec-front .pill         { color: var(--blue);   border-color: var(--blue);   background: #fff; }
    .setup-section.sec-front .pill.active  { background: var(--blue);   color: #fff; }

    .setup-section.sec-vowel .pill         { color: var(--orange); border-color: var(--orange); background: #fff; }
    .setup-section.sec-vowel .pill.active  { background: var(--orange); color: #fff; }

    .setup-section.sec-last  .pill         { color: var(--green);  border-color: var(--green);  background: #fff; }
    .setup-section.sec-last  .pill.active  { background: var(--green);  color: #fff; }

    .setup-note {
      font-size: 13px;
      color: #999;
      text-align: center;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>

<!-- ================================================
     MAIN VIEW
================================================ -->
<div id="view-main">
  <div class="top-bar">
    <button type="button" class="btn-settings" onclick="showSetup()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Letters instellen
    </button>
  </div>

  <div class="cards">
    <div class="card card-front" id="card-front">
      <span class="card-label">Begin</span>
      <span class="syllable" id="syl-front"></span>
      <button type="button" class="lock-btn" id="lock-front" onclick="toggleLock('front')" title="Vergrendelen"></button>
    </div>
    <div class="card card-vowel" id="card-vowel">
      <span class="card-label">Midden</span>
      <span class="syllable" id="syl-vowel"></span>
      <button type="button" class="lock-btn" id="lock-vowel" onclick="toggleLock('vowel')" title="Vergrendelen"></button>
    </div>
    <div class="card card-last" id="card-last">
      <span class="card-label">Eind</span>
      <span class="syllable" id="syl-last"></span>
      <button type="button" class="lock-btn" id="lock-last" onclick="toggleLock('last')" title="Vergrendelen"></button>
    </div>
  </div>

  <button type="button" class="btn-new" onclick="generateWord()">Nieuw woord</button>
</div>

<!-- ================================================
     SETUP VIEW
================================================ -->
<div id="view-setup">
  <div class="setup-topbar">
    <h1>Letters instellen</h1>
    <button type="button" class="btn-back" onclick="showMain()">← Terug</button>
  </div>

  <div class="setup-section sec-front">
    <h2>Begin — eerste positie</h2>
    <div class="pills" id="pills-front"></div>
  </div>

  <div class="setup-section sec-vowel">
    <h2>Klinkers — tweede positie</h2>
    <div class="pills" id="pills-vowel"></div>
  </div>

  <div class="setup-section sec-last">
    <h2>Eind — derde positie</h2>
    <div class="pills" id="pills-last"></div>
  </div>

  <p class="setup-note">Tik op een letter om die aan of uit te zetten. Minstens één per positie is verplicht.</p>
</div>

<script>
  /* ------------------------------------------------
     Data
  ------------------------------------------------ */
  const ALL = {
    front: ['b','bl','br','d','dr','dw','f','fl','fr','g','gl','gr','h','j','k','kl','kn','kr','kw','l','m','n','p','pl','pr','r','s','sch','sl','sm','sn','sp','st','t','tr','v','vl','vr','w','z','zw'],
    vowel: ['a','aa','au','e','ee','ei','eu','i','ie','ij','o','oe','oo','ou','u','ui','uu'],
    last:  ['b','cht','d','f','ft','g','gt','k','ks','l','lf','lg','lk','lm','lp','ls','m','mp','n','ng','nk','ns','nt','p','ps','r','rf','rg','rk','rm','rn','rp','rs','rt','s','sp','st','t','ts','w']
  };

  const DEFAULTS = {
    front: ['m','r','v'],
    vowel: ['aa','i','oo','o'],
    last:  ['k','n','s']
  };

  const COLS = ['front','vowel','last'];
  const STORAGE_KEY = 'klikklak_v2';

  /* ------------------------------------------------
     State
  ------------------------------------------------ */
  let settings = loadSettings();
  let locks    = { front: false, vowel: false, last: false };
  let current  = { front: null,  vowel: null,  last: null  };

  /* ------------------------------------------------
     Storage
  ------------------------------------------------ */
  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (s && s.front?.length && s.vowel?.length && s.last?.length) return s;
    } catch(e) {}
    return { front: [...DEFAULTS.front], vowel: [...DEFAULTS.vowel], last: [...DEFAULTS.last] };
  }

  function saveSettings() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); } catch(e) {}
  }

  /* ------------------------------------------------
     Word generation
  ------------------------------------------------ */
  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function generateWord() {
    const isFirst   = current.front === null;
    const allLocked = !isFirst && locks.front && locks.vowel && locks.last;
    const prev      = { ...current };
    let   attempts  = 0;

    do {
      if (isFirst || !locks.front) current.front = pick(settings.front);
      if (isFirst || !locks.vowel) current.vowel = pick(settings.vowel);
      if (isFirst || !locks.last)  current.last  = pick(settings.last);
      attempts++;
    } while (
      !isFirst && !allLocked && attempts < 50 &&
      current.front === prev.front &&
      current.vowel === prev.vowel &&
      current.last  === prev.last
    );

    updateDisplay({
      front: isFirst || current.front !== prev.front,
      vowel: isFirst || current.vowel !== prev.vowel,
      last:  isFirst || current.last  !== prev.last
    });
  }

  function updateDisplay(animate) {
    COLS.forEach(col => {
      const el = document.getElementById('syl-' + col);
      el.textContent = current[col] ?? '';
      if (animate[col]) {
        el.classList.remove('pop');
        void el.offsetWidth; // force reflow so animation replays
        el.classList.add('pop');
      }
    });
  }

  /* ------------------------------------------------
     Lock toggles
  ------------------------------------------------ */
  function toggleLock(col) {
    locks[col] = !locks[col];
    refreshLockUI(col);
  }

  const ICON_LOCKED   = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
  const ICON_UNLOCKED = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`;

  function refreshLockUI(col) {
    const btn  = document.getElementById('lock-' + col);
    const card = document.getElementById('card-' + col);
    btn.innerHTML = locks[col] ? ICON_LOCKED : ICON_UNLOCKED;
    btn.classList.toggle('is-locked', locks[col]);
    card.classList.toggle('is-locked', locks[col]);
  }

  /* ------------------------------------------------
     View switching
  ------------------------------------------------ */
  function showSetup() {
    buildPills();
    document.getElementById('view-main').style.display  = 'none';
    document.getElementById('view-setup').style.display = 'flex';
  }

  function showMain() {
    // Guard: if a column is now empty (shouldn't happen, but safety net)
    COLS.forEach(col => {
      if (!settings[col].length) settings[col] = [...DEFAULTS[col]];
    });
    saveSettings();

    // If a locked column's current syllable was removed, release the lock
    COLS.forEach(col => {
      if (current[col] !== null && !settings[col].includes(current[col])) {
        if (locks[col]) {
          locks[col] = false;
          refreshLockUI(col);
        }
        current[col] = pick(settings[col]);
      }
    });

    document.getElementById('view-setup').style.display = 'none';
    document.getElementById('view-main').style.display  = 'flex';

    // Refresh display (no animation — we're just coming back)
    updateDisplay({ front: false, vowel: false, last: false });
  }

  /* ------------------------------------------------
     Setup pills
  ------------------------------------------------ */
  function buildPills() {
    COLS.forEach(col => {
      const container = document.getElementById('pills-' + col);
      container.innerHTML = '';
      ALL[col].forEach(syl => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pill' + (settings[col].includes(syl) ? ' active' : '');
        btn.textContent = syl;
        btn.addEventListener('click', () => togglePill(col, syl, btn));
        container.appendChild(btn);
      });
    });
  }

  function togglePill(col, syl, btn) {
    const idx = settings[col].indexOf(syl);
    if (idx === -1) {
      settings[col].push(syl);
      btn.classList.add('active');
    } else {
      if (settings[col].length <= 1) return; // must keep at least one
      settings[col].splice(idx, 1);
      btn.classList.remove('active');
    }
    saveSettings();
  }

  /* ------------------------------------------------
     Boot
  ------------------------------------------------ */
  COLS.forEach(col => refreshLockUI(col));
  generateWord();
</script>
</body>
</html>
